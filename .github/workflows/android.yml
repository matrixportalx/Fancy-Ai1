name: Android CI Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Code Quality Check (Lint)
      run: ./gradlew lintDebug

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Get Version Name from Gradle
      id: get_version
      run: |
        # Extract version name from build.gradle.kts
        VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
        echo "VERSION=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Rename APK for Release
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk Fancy-Ai-${{ steps.get_version.outputs.VERSION }}.apk

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Fancy-Ai-${{ steps.get_version.outputs.VERSION }}
        path: Fancy-Ai-${{ steps.get_version.outputs.VERSION }}.apk
