<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fancy AI - Virtual Phone OS</title>
    <style>
        /* --- Root CSS Theme Tokens --- */
        :root {
            --bg-dark: #0a0a0b;
            --bg-card: #141416;
            --bg-input: #1e1e21;
            --border: #2e2e33;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --danger: #ef4444;
            --success: #22c55e;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --gradient-5: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --gradient-6: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }

        /* --- Strict Device Viewport Constraints --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text-main);
        }

        #os-container {
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        #home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        #home-screen::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(79, 172, 254, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(240, 147, 251, 0.06) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            background-size: 200% 200%;
        }

        .home-title {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease;
        }

        .home-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease 0.1s both;
        }

        /* --- Status Bar --- */
        .os-status-bar {
            width: 100%;
            max-width: 420px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease;
            margin-bottom: 12px;
        }
        .os-status-time {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }
        .os-status-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .os-status-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .os-status-pill.pill-chars {
            background: rgba(139, 92, 246, 0.12);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .os-status-pill.pill-autopost {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .os-status-pill.pill-autopost.inactive {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .os-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 4px #22c55e;
            animation: pulse 2s infinite;
        }
        .os-status-dot.inactive {
            background: var(--text-muted);
            box-shadow: none;
            animation: none;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px 30px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            background: none; border: none; color: var(--text-main); cursor: pointer;
            animation: fadeInUp 0.6s ease both;
        }
        .app-icon:nth-child(1) { animation-delay: 0.05s; }
        .app-icon:nth-child(2) { animation-delay: 0.1s; }
        .app-icon:nth-child(3) { animation-delay: 0.15s; }
        .app-icon:nth-child(4) { animation-delay: 0.2s; }
        .app-icon:nth-child(5) { animation-delay: 0.25s; }
        .app-icon:nth-child(6) { animation-delay: 0.3s; }
        .app-icon:nth-child(7) { animation-delay: 0.35s; }

        .icon-box {
            width: 68px; height: 68px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .icon-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .app-icon:hover .icon-box,
        .app-icon:active .icon-box {
            transform: scale(0.92) translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);
        }

        .app-icon span {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        /* --- Notification Badges --- */
        .app-icon-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .app-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            border-radius: 10px;
            background: var(--danger);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5);
            animation: badgePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .app-badge.badge-dot {
            min-width: 10px;
            width: 10px;
            height: 10px;
            padding: 0;
            top: -2px;
            right: -2px;
            border-radius: 50%;
        }
        .app-badge.badge-hidden {
            display: none;
        }
        @keyframes badgePop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        #app-window {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        .os-nav-header {
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            background: rgba(20, 20, 22, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            width: 100%;
            position: relative;
        }

        #app-content-slot {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        /* --- Toast & Modal System --- */
        .os-toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 99999; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
        .os-toast { background: rgba(0,0,0,0.88); color: white; padding: 10px 20px; border-radius: 14px; font-size: 0.85rem; font-weight: 600; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: osToastIn 0.3s ease, osToastOut 0.3s ease 2.2s forwards; pointer-events: auto; max-width: 85vw; text-align: center; }
        .os-toast.toast-success { border-color: rgba(34,197,94,0.3); }
        .os-toast.toast-error { border-color: rgba(239,68,68,0.3); }
        .os-toast.toast-warning { border-color: rgba(245,158,11,0.3); }
        @keyframes osToastIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes osToastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }

        .os-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 99998; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; animation: osModalFadeIn 0.2s ease; }
        .os-modal-sheet { background: #1a1a1e; border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 20px; min-width: 280px; max-width: 340px; width: 85%; box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: osModalSlideIn 0.25s ease; position: relative; z-index: 99999; }
        .os-modal-title { font-size: 1rem; font-weight: 800; color: white; margin-bottom: 10px; }
        .os-modal-body { font-size: 0.88rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 18px; }
        .os-modal-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 12px 14px; border-radius: 12px; font-size: 0.92rem; outline: none; margin-bottom: 18px; }
        .os-modal-input:focus { border-color: var(--accent); }
        .os-modal-actions { display: flex; gap: 10px; }
        .os-modal-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.88rem; cursor: pointer; border: none; text-align: center; transition: all 0.15s; }
        .os-modal-btn:active { transform: scale(0.96); }
        .os-modal-btn-cancel { background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid var(--border); }
        .os-modal-btn-confirm { background: var(--accent); color: white; }
        .os-modal-btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

        /* --- OS System Overlays --- */
        #os-system-loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100000; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .os-spinner { width: 40px; height: 40px; border: 3px solid rgba(139, 92, 246, 0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }

        /* --- Global Lightbox --- */
        #os-lightbox { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.95); z-index:99999; justify-content:center; align-items:center; backdrop-filter:blur(5px); }
        #os-lightbox-img { max-width:100vw; max-height:100vh; object-fit:contain; border-radius:8px; transform-origin:center center; will-change:transform; }
        .lightbox-btn-close { position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.5); color:white; width:44px; height:44px; border-radius:50%; border:none; font-size:1.5rem; cursor:pointer; z-index:100001; }
        .lightbox-actions { position:absolute; bottom:0; left:0; right:0; display:flex; gap:12px; padding:16px; padding-bottom:calc(16px + env(safe-area-inset-bottom)); background:linear-gradient(to top, rgba(0,0,0,0.8), transparent); z-index:100002; }
        .lightbox-btn { flex:1; padding:14px; border-radius:10px; font-weight:600; cursor:pointer; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:white; font-size:0.9rem; }
        .lightbox-btn-primary { background:var(--accent); border:none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="os-system-loader">
    <div class="os-spinner"></div>
    <div id="os-loader-text" style="color:var(--text-muted); font-size:0.8rem; font-weight:700; letter-spacing:1px; text-transform:uppercase;">Initializing OS</div>
</div>

<div id="os-container">
    <div id="home-screen">
        <div class="os-status-bar">
            <div class="os-status-right">
                <span class="os-status-pill pill-chars" id="osStatusChars">👤 -</span>
                <span class="os-status-pill pill-autopost inactive" id="osStatusAutoPost"><span class="os-status-dot inactive" id="osStatusDot"></span>Auto</span>
            </div>
        </div>
        <div class="home-title">FANCY AI</div>
        <div class="home-subtitle">Virtual Intelligence OS</div>
        <div id="homeAutoPostBadge" style="display:none; margin-bottom:20px; padding:4px 12px; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.2); border-radius:20px; font-size:0.7rem; color:#22c55e; font-weight:600; letter-spacing:0.5px; position:relative; z-index:1;">
            🟢 Auto-Post Active
        </div>
        <div class="app-grid">
            <div class="app-icon" onclick="OS.launch('MessengerApp')"><div class="app-icon-wrapper"><span class="icon-box">💬</span><span class="app-badge badge-hidden" id="badge-MessengerApp">0</span></div><span>Chat</span></div>
            <div class="app-icon" onclick="OS.launch('UstagramApp')"><div class="app-icon-wrapper"><span class="icon-box">📸</span><span class="app-badge badge-hidden" id="badge-UstagramApp">0</span></div><span>Ustagram</span></div>
            <div class="app-icon" onclick="OS.launch('RebbitApp')"><div class="app-icon-wrapper"><span class="icon-box">🔞</span><span class="app-badge badge-hidden" id="badge-RebbitApp">0</span></div><span>Rebbit</span></div>
            <div class="app-icon" onclick="OS.launch('YApp')"><div class="app-icon-wrapper"><span class="icon-box">✕</span><span class="app-badge badge-hidden" id="badge-YApp">0</span></div><span>Y</span></div>
            <div class="app-icon" onclick="OS.launch('ImagingApp')"><span class="icon-box">🎨</span><span>Imaging</span></div>
            <div class="app-icon" onclick="OS.launch('GalleryApp')"><span class="icon-box">🖼️</span><span>Gallery</span></div>
            <div class="app-icon" onclick="OS.launch('ContactsApp')"><span class="icon-box">👤</span><span>Chars</span></div>
            <div class="app-icon" onclick="OS.launch('SettingsApp')"><span class="icon-box">⚙️</span><span>Settings</span></div>
            <div class="app-icon" onclick="OS.launch('GamesApp')"><span class="icon-box">🎮</span><span>Games</span></div>
        </div>
    </div>

    <div id="app-window">
        <div class="os-nav-header">
            <strong id="os-app-title" style="color:white; font-size:1.1rem; text-align:center;">Application</strong>
        </div>
        <div id="app-content-slot"></div>
    </div>

    <div id="os-lightbox" onclick="OS.closeLightbox()">
        <button class="lightbox-btn-close" onclick="OS.closeLightbox()">✕</button>
        <img id="os-lightbox-img" src="" alt="Enlarged view" onclick="event.stopPropagation()">
        <div class="lightbox-actions" onclick="event.stopPropagation()">
            <button class="lightbox-btn lightbox-btn-primary" onclick="OS.downloadLightboxImg()">💾 Save</button>
            <button class="lightbox-btn" onclick="OS.shareLightboxImg()">🔗 Share</button>
        </div>
    </div>
</div>

<script src="js/core/db.js"></script>
<script src="js/core/state.js"></script>
<script src="js/core/api.js"></script>
<script src="js/lib/jszip.min.js"></script>
<script src="js/apps/imaging.js"></script>

<script>
    const OS = {
        activeApp: null,
        navStack: [],
        _loadedScripts: new Set(['ImagingApp']),
        _appMap: {
            'MessengerApp': 'js/apps/messenger.js',
            'UstagramApp': 'js/apps/ustagram.js',
            'RebbitApp': 'js/apps/rebbit.js',
            'YApp': 'js/apps/y.js',
            'GalleryApp': 'js/apps/gallery.js',
            'ContactsApp': 'js/apps/contacts.js',
            'SettingsApp': 'js/apps/settings.js',
            'GamesApp': 'js/apps/games.js'
        },

        launch: async function(appName, params) {
            // 1. Ensure app script is loaded
            if (!this._loadedScripts.has(appName)) {
                const scriptPath = this._appMap[appName];
                if (scriptPath) {
                    this.toast(`Loading ${appName}...`, 'info');
                    try {
                        await this._loadScript(scriptPath);
                        this._loadedScripts.add(appName);
                    } catch (e) {
                        this.toast(`Failed to load ${appName}`, 'error');
                        return;
                    }
                }
            }

            // 2. Cleanup previous app
            if (this.activeApp && window[this.activeApp] && typeof window[this.activeApp].cleanup === 'function') {
                window[this.activeApp].cleanup();
            }

            this.activeApp = appName;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-window').style.display = 'flex';

            const titleMap = {
                'MessengerApp': 'Messages', 'UstagramApp': 'Ustagram', 'RebbitApp': 'Rebbit',
                'YApp': 'Y', 'ImagingApp': 'Imaging', 'GalleryApp': 'Gallery',
                'ContactsApp': 'Characters', 'SettingsApp': 'Settings', 'GamesApp': 'Games'
            };
            document.getElementById('os-app-title').innerText = titleMap[appName] || appName.replace('App', '');

            this.markAppRead(appName);
            this.navStack = [];
            history.pushState({ app: appName }, "", `#${appName}`);

            const slot = document.getElementById('app-content-slot');
            slot.innerHTML = '';

            if (window[appName] && typeof window[appName].init === 'function') {
                window[appName].init(slot, params);
            } else {
                slot.innerHTML = `<div style="padding:30px; text-align:center; color:var(--text-muted);">App [${appName}] not found or failed to initialize.</div>`;
            }

            // Check API Key
            const llmApps = ['MessengerApp', 'UstagramApp', 'RebbitApp', 'YApp'];
            if (llmApps.includes(appName)) {
                const s = State.settings || {};
                const provider = s.provider || 'deepinfra';
                if (provider !== 'localllm' && !s.key) {
                    setTimeout(() => this.toast("⚠️ No API key set — check Settings", 'warning'), 500);
                }
            }
        },

        _loadScript: function(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        },

        pushView: function(restoreFn) {
            if (this.activeApp) {
                this.navStack.push({ app: this.activeApp, restore: restoreFn });
                const depth = this.navStack.length;
                history.pushState({ app: this.activeApp, viewDepth: depth }, "", `#${this.activeApp}/v${depth}`);
            }
        },

        closeTopOverlay: function() {
            const modal = document.querySelector('.os-modal-overlay');
            if (modal) { modal.remove(); return true; }

            const lightbox = document.getElementById('os-lightbox');
            if (lightbox && lightbox.style.display === 'flex') {
                this.closeLightbox(true);
                return true;
            }

            const appOverlays = document.querySelectorAll('.rb-settings-overlay, .ug-settings-overlay, .y-settings-overlay, #memoryOverlay, #charSelectorPopup');
            for (const overlay of appOverlays) { if (overlay.parentNode) { overlay.remove(); return true; } }
            return false;
        },

        goBack: function() {
            if (this.closeTopOverlay()) return;
            if (this.navStack.length > 0) { window.history.back(); return; }
            if (this.activeApp) { this.goHome(); return; }
            this._nativeExit();
        },

        _nativeExit: function() {
            if (window.AndroidBridge && typeof window.AndroidBridge.requestExit === 'function') {
                window.AndroidBridge.requestExit();
            } else if (window.history.length > 1) {
                window.history.back();
            }
        },

        goHome: function() {
            this.closeTopOverlay();
            if (this.activeApp && window[this.activeApp] && typeof window[this.activeApp].cleanup === 'function') {
                window[this.activeApp].cleanup();
            }
            this.activeApp = null;
            this.navStack = [];
            document.getElementById('app-window').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
            this.updateAutoPostBadge();
            this.updateBadges();
            this.updateStatusBar();
            this.startBackgroundAutoPost();
            if (location.hash || (history.state && !history.state.home)) {
                history.replaceState({ home: true }, "", " ");
            }
        },

        startBackgroundAutoPost: function() {
            const s = State.settings || {};
            const provider = s.provider || 'deepinfra';
            const hasKey = provider === 'localllm' || s.key;
            if (!s.autoPostEnabled || !hasKey) return;

            const autoApps = [
                { id: 'UstagramApp', key: 'autoPostUstagram' },
                { id: 'RebbitApp', key: 'autoPostRebbit' },
                { id: 'YApp', key: 'autoPostY' }
            ];

            autoApps.forEach(app => {
                if (this.activeApp !== app.id && s[app.key]) {
                    if (window[app.id]) {
                        window[app.id].startAutoPost();
                    } else if (!this._loadedScripts.has(app.id)) {
                        // Background load for auto-post if enabled
                        this._loadScript(this._appMap[app.id]).then(() => {
                            this._loadedScripts.add(app.id);
                            if (window[app.id]) window[app.id].startAutoPost();
                        });
                    }
                }
            });
        },

        updateAutoPostBadge: function() {
            const badge = document.getElementById('homeAutoPostBadge');
            if (!badge) return;
            const s = State.settings || {};
            const provider = s.provider || 'deepinfra';
            const hasKey = provider === 'localllm' || s.key;
            const anyEnabled = s.autoPostEnabled && (s.autoPostUstagram || s.autoPostRebbit || s.autoPostY) && hasKey;
            badge.style.display = anyEnabled ? 'block' : 'none';
            if (anyEnabled) {
                const apps = [];
                if (s.autoPostUstagram) apps.push('📸');
                if (s.autoPostRebbit) apps.push('🔞');
                if (s.autoPostY) apps.push('✕');
                badge.innerHTML = `🟢 Auto-Post Active · ${apps.join(' ')} · ${s.autoPostInterval || 5}min`;
            }
        },

        updateStatusBar: function() {
            const charsEl = document.getElementById('osStatusChars');
            if (charsEl) {
                const count = (State.characters || []).length;
                charsEl.textContent = `👤 ${count}`;
            }
            const autoEl = document.getElementById('osStatusAutoPost');
            if (autoEl) {
                const s = State.settings || {};
                const provider = s.provider || 'deepinfra';
                const hasKey = provider === 'localllm' || s.key;
                const anyEnabled = s.autoPostEnabled && (s.autoPostUstagram || s.autoPostRebbit || s.autoPostY) && hasKey;
                if (anyEnabled) {
                    autoEl.classList.remove('inactive');
                    const apps = [];
                    if (s.autoPostUstagram) apps.push('📸');
                    if (s.autoPostRebbit) apps.push('🔞');
                    if (s.autoPostY) apps.push('✕');
                    autoEl.innerHTML = `<span class="os-status-dot" id="osStatusDot"></span>${apps.join('')}`;
                } else {
                    autoEl.classList.add('inactive');
                    autoEl.innerHTML = `<span class="os-status-dot inactive" id="osStatusDot"></span>Auto`;
                }
            }
        },

        updateBadges: function() {
            if (!State.lastReadTimestamps) State.lastReadTimestamps = {};
            if (!State.chatReadTimestamps) State.chatReadTimestamps = {};
            const ts = State.lastReadTimestamps;
            const cts = State.chatReadTimestamps;
            let unreadChat = 0;
            const validCharIds = new Set((State.characters || []).map(c => c.id));
            for (const charId in State.sessions) {
                if (!validCharIds.has(charId)) continue;
                const session = State.sessions[charId] || [];
                const lastRead = cts[charId] || 0;
                for (const msg of session) {
                    if ((msg.role === 'assistant' || msg.sender === 'ai') && msg.timestamp && msg.timestamp > lastRead) unreadChat++;
                }
            }
            this._setBadge('MessengerApp', unreadChat);
            const ugLastRead = ts['UstagramApp'] || 0;
            const unreadUg = (State.instagramPosts || []).filter(p => p.timestamp && p.timestamp > ugLastRead).length;
            this._setBadge('UstagramApp', unreadUg);
            const rbLastRead = ts['RebbitApp'] || 0;
            const unreadRb = (State.redditPosts || []).filter(p => p.timestamp && p.timestamp > rbLastRead).length;
            this._setBadge('RebbitApp', unreadRb);
            const yLastRead = ts['YApp'] || 0;
            const unreadY = (State.xPosts || []).filter(p => p.timestamp && p.timestamp > yLastRead).length;
            this._setBadge('YApp', unreadY);
        },

        _setBadge: function(appName, count) {
            const badge = document.getElementById('badge-' + appName);
            if (!badge) return;
            if (count <= 0) { badge.classList.add('badge-hidden'); badge.classList.remove('badge-dot'); }
            else if (count === 1) { badge.classList.remove('badge-hidden'); badge.classList.add('badge-dot'); badge.textContent = ''; }
            else { badge.classList.remove('badge-hidden', 'badge-dot'); badge.textContent = count > 99 ? '99+' : count; }
        },

        markAppRead: function(appName) {
            const badgeApps = ['MessengerApp', 'UstagramApp', 'RebbitApp', 'YApp'];
            if (!badgeApps.includes(appName)) return;
            if (!State.lastReadTimestamps) State.lastReadTimestamps = {};
            State.lastReadTimestamps[appName] = Date.now();
            State.save();
            this._setBadge(appName, 0);
        },

        formatMarkdown: function(text) {
            if (!text) return "";
            let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/```([\s\S]*?)```/g, '<pre style="background:rgba(255,255,255,0.04);padding:10px;border-radius:8px;overflow-x:auto;font-size:0.82rem;margin:6px 0;border:1px solid var(--border);"><code>$1</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:0.85rem;">$1</code>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:var(--accent);text-decoration:underline;" target="_blank">$1</a>');
            html = html.replace(/^### (.+)$/gm, '<div style="font-size:1rem;font-weight:800;color:white;margin:8px 0 4px;">$1</div>');
            html = html.replace(/^## (.+)$/gm, '<div style="font-size:1.1rem;font-weight:800;color:white;margin:10px 0 4px;">$1</div>');
            html = html.replace(/^# (.+)$/gm, '<div style="font-size:1.2rem;font-weight:900;color:white;margin:12px 0 4px;">$1</div>');
            html = html.replace(/^(\*{3,}|-{3,})$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:10px 0;">');
            html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<b><i>$1</i></b>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            html = html.replace(/\*(.*?)\*/g, '<i>$1</i>');
            html = html.replace(/__(.*?)__/g, '<b>$1</b>');
            html = html.replace(/(?<!\w)_(.*?)_(?!\w)/g, '<i>$1</i>');
            html = html.replace(/~~(.*?)~~/g, '<span style="text-decoration:line-through;opacity:0.6;">$1</span>');
            html = html.replace(/^[-*] (.+)$/gm, '<div style="padding-left:16px;position:relative;"><span style="position:absolute;left:4px;color:var(--text-muted);">•</span>$1</div>');
            html = html.replace(/^(\d+)\. (.+)$/gm, '<div style="padding-left:20px;"><span style="color:var(--text-muted);margin-right:4px;">$1.</span>$2</div>');
            html = html.replace(/\n/g, '<br>');
            return html;
        },

        speak: function(text) { if (window.AndroidBridge && window.AndroidBridge.speak) window.AndroidBridge.speak(text); },
        stopSpeaking: function() { if (window.AndroidBridge && window.AndroidBridge.stopSpeaking) window.AndroidBridge.stopSpeaking(); },
        listen: function(onResult, onStatus) {
            this._speechResultCallback = onResult; this._speechStatusCallback = onStatus;
            if (window.AndroidBridge && window.AndroidBridge.startListening) window.AndroidBridge.startListening();
        },
        stopListening: function() { if (window.AndroidBridge && window.AndroidBridge.stopListening) window.AndroidBridge.stopListening(); },
        _onSpeechResult: function(text) { if (this._speechResultCallback) this._speechResultCallback(text); },
        _onSpeechEvent: function(event, code) { if (this._speechStatusCallback) this._speechStatusCallback(event, code); },
        showNotification: function(title, message, charId) { if (window.AndroidBridge && window.AndroidBridge.showNotification) window.AndroidBridge.showNotification(title, message, charId || ""); },

        // --- Foreground Service Management ---
        _activeTasks: new Set(),
        setTaskActive: function(id, active, label) {
            if (active) this._activeTasks.add(id);
            else this._activeTasks.delete(id);
            if (window.AndroidBridge && window.AndroidBridge.setForegroundServiceActive) {
                if (this._activeTasks.size > 0) {
                    window.AndroidBridge.setForegroundServiceActive(true, label || "Processing AI tasks...");
                } else {
                    window.AndroidBridge.setForegroundServiceActive(false, "");
                }
            }
        },

        _lbScale: 1, _lbTX: 0, _lbTY: 0, _lbLastDist: 0, _lbLastTap: 0, _lbSX: 0, _lbSY: 0,
        openLightbox: function(src) {
            const lb = document.getElementById('os-lightbox');
            const img = document.getElementById('os-lightbox-img');
            if (!lb || !img) return;
            img.src = src;
            this._lbScale = 1; this._lbTX = 0; this._lbTY = 0;
            img.style.transform = `translate(0px, 0px) scale(1)`;
            img.style.display = 'block'; // Ensure image is visible
            lb.style.display = 'flex';
            this._setupLbGestures();
            history.pushState({ lightbox: true }, "");
        },
        closeLightbox: function(preventHistory) {
            const lb = document.getElementById('os-lightbox');
            if (lb && lb.style.display === 'flex') {
                lb.style.display = 'none';
                if (!preventHistory && history.state && history.state.lightbox) history.back();
            }
        },
        _setupLbGestures: function() {
            const img = document.getElementById('os-lightbox-img');
            if (!img || img.dataset.gestures) return;
            img.dataset.gestures = "true";

            img.addEventListener('touchstart', (e) => {
                const now = Date.now();
                if (now - this._lbLastTap < 300) {
                    this._lbScale = (this._lbScale > 1) ? 1 : 2;
                    this._lbTX = 0; this._lbTY = 0;
                    img.style.transition = 'transform 0.2s';
                    img.style.transform = `translate(0px, 0px) scale(${this._lbScale})`;
                    this._lbLastTap = 0; return;
                }
                this._lbLastTap = now; img.style.transition = 'none';
                if (e.touches.length === 1) {
                    this._lbSX = e.touches[0].clientX - this._lbTX;
                    this._lbSY = e.touches[0].clientY - this._lbTY;
                } else if (e.touches.length === 2) {
                    this._lbLastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                }
            }, { passive: false });

            img.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1) {
                    this._lbTX = e.touches[0].clientX - this._lbSX;
                    this._lbTY = e.touches[0].clientY - this._lbSY;
                    if (this._lbScale === 1 && this._lbTY > 100) { this.closeLightbox(); return; }
                } else if (e.touches.length === 2) {
                    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    this._lbScale = Math.max(1, this._lbScale * (d / this._lbLastDist));
                    this._lbLastDist = d;
                }
                img.style.transform = `translate(${this._lbTX}px, ${this._lbTY}px) scale(${this._lbScale})`;
                if (this._lbScale > 1) e.preventDefault();
            }, { passive: false });
        },
        downloadLightboxImg: function() {
            const src = document.getElementById('os-lightbox-img').src;
            const a = document.createElement('a'); a.href = src; a.download = `fancy_${Date.now()}.png`;
            document.body.appendChild(a); a.click(); a.remove();
        },
        shareLightboxImg: function() {
            const src = document.getElementById('os-lightbox-img').src;
            if (window.AndroidBridge && window.AndroidBridge.shareImage) window.AndroidBridge.shareImage(src);
        },

        toast: function(msg, type) {
            let container = document.getElementById('os-toast-container');
            if (!container) { container = document.createElement('div'); container.id = 'os-toast-container'; document.body.appendChild(container); }
            const t = document.createElement('div');
            t.className = 'os-toast' + (type ? ` toast-${type}` : '');
            t.textContent = msg;
            container.appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 2600);
        },
        confirm: function(message, onConfirm, opts) {
            opts = opts || {}; const overlay = document.createElement('div'); overlay.className = 'os-modal-overlay';
            overlay.innerHTML = `<div class="os-modal-sheet"><div class="os-modal-title">${opts.title || 'Confirm'}</div><div class="os-modal-body">${message}</div><div class="os-modal-actions"><button class="os-modal-btn os-modal-btn-cancel" id="osConfirmCancel">Cancel</button><button class="os-modal-btn ${opts.danger ? 'os-modal-btn-danger' : 'os-modal-btn-confirm'}" id="osConfirmOk">${opts.confirmText || 'Confirm'}</button></div></div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#osConfirmCancel').onclick = () => overlay.remove();
            overlay.querySelector('#osConfirmOk').onclick = () => { overlay.remove(); if (onConfirm) onConfirm(); };
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
        },
        prompt: function(message, defaultValue, onConfirm) {
            const overlay = document.createElement('div'); overlay.className = 'os-modal-overlay';
            overlay.innerHTML = `<div class="os-modal-sheet"><div class="os-modal-title">${message}</div><input class="os-modal-input" id="osPromptInput" value="${defaultValue || ''}"><div class="os-modal-actions"><button class="os-modal-btn os-modal-btn-cancel" id="osPromptCancel">Cancel</button><button class="os-modal-btn os-modal-btn-confirm" id="osPromptOk">OK</button></div></div>`;
            document.body.appendChild(overlay);
            const input = overlay.querySelector('#osPromptInput'); input.focus(); input.select();
            const submit = () => { const val = input.value.trim(); overlay.remove(); if (onConfirm) onConfirm(val || null); };
            const cancel = () => { overlay.remove(); if (onConfirm) onConfirm(null); };
            overlay.querySelector('#osPromptCancel').onclick = cancel;
            overlay.querySelector('#osPromptOk').onclick = submit;
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
            overlay.onclick = (e) => { if (e.target === overlay) cancel(); };
        }
    };
    window.OS = OS;

    const Autonomous = {
        _timer: null,
        init: function() { this._timer = setInterval(() => this.tick(), 15 * 60 * 1000); console.log("Autonomous Lifecycle Active"); },
        tick: async function() {
            const s = State.settings || {}; if (!s.autonomousEnabled || State.characters.length === 0) return;
            const bot = State.characters[Math.floor(Math.random() * State.characters.length)];
            const rand = Math.random();
            if (rand < 0.4) this.generateMonologue(bot);
            else if (rand < 0.6) this.checkMessageUser(bot);
        },
        generateMonologue: async function(bot) {
            try {
                const thought = await API.sendMessage(bot.id, `You are ${bot.name}. Write a short internal monologue (1-2 sentences).`, null, false, 'chat');
                if (thought && thought.length > 5) {
                    if (!State.monologues) State.monologues = {}; if (!State.monologues[bot.id]) State.monologues[bot.id] = [];
                    State.monologues[bot.id].push({ text: thought.trim(), timestamp: Date.now() });
                    if (State.monologues[bot.id].length > 20) State.monologues[bot.id].shift();
                    State.save();
                }
            } catch(e) {}
        },
        checkMessageUser: async function(bot) {
            const session = State.sessions[bot.id] || []; if (session.length === 0) return;
            const diff = Date.now() - session[session.length - 1].timestamp;
            if (diff > 2 * 60 * 60 * 1000) {
                try {
                    const msgText = await API.sendMessage(bot.id, `You are ${bot.name}. Send a short check-in message to user.`, null, true, 'chat');
                    if (msgText && msgText.length > 5) {
                        State.sessions[bot.id].push({ id: 'm'+Date.now(), sender: 'ai', text: msgText.trim(), timestamp: Date.now() });
                        State.save(); OS.showNotification(bot.name, msgText.trim(), bot.id);
                        if (OS.activeApp === 'MessengerApp' && MessengerApp.activeCharId === bot.id) MessengerApp.renderChatLog();
                        else OS.updateBadges();
                    }
                } catch(e) {}
            }
        }
    };

    window.addEventListener('popstate', function(event) {
        const state = event.state || {};

        // Handle Lightbox
        if (state.lightbox) return; // Stay on page
        const lb = document.getElementById('os-lightbox');
        if (lb && lb.style.display === 'flex') { OS.closeLightbox(true); return; }

        const targetDepth = state.viewDepth || 0;
        const currentDepth = OS.navStack.length;
        if (currentDepth > targetDepth) {
            while (OS.navStack.length > targetDepth) {
                const entry = OS.navStack.pop();
                if (entry && typeof entry.restore === 'function') entry.restore();
            }
            return;
        }
        if (OS.activeApp && OS.navStack.length === 0) {
            if (state.home || !state.app || state.app !== OS.activeApp) OS.goHome();
        }
    });

    window.addEventListener('load', async () => {
        if (!history.state) history.replaceState({ home: true }, "", " ");
        if (window._stateReady) await window._stateReady;

        // Remove loader
        const loader = document.getElementById('os-system-loader');
        if (loader) loader.style.display = 'none';

        OS.updateAutoPostBadge(); OS.updateBadges(); OS.updateStatusBar();
        OS.startBackgroundAutoPost(); Autonomous.init();
    });

    // Helper for State to update loader text
    window.updateOSLoader = (text) => {
        const el = document.getElementById('os-loader-text');
        if (el) el.innerText = text;
    };
</script>
