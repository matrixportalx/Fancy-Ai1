<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fancy AI - Virtual Phone OS</title>
    <style>
        /* --- Root CSS Theme Tokens --- */
        :root {
            --bg-dark: #0a0a0b;
            --bg-card: #141416;
            --bg-input: #1e1e21;
            --border: #2e2e33;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --danger: #ef4444;
            --success: #22c55e;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --gradient-5: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --gradient-6: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }

        /* --- Strict Device Viewport Constraints --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text-main);
        }

        /* --- Global Markdown Styles --- */
        b, strong { font-weight: 700; color: #fff; }
        i, em { font-style: italic; opacity: 0.9; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-10px) rotate(1deg); }
            66% { transform: translateY(5px) rotate(-1deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #os-container {
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        #home-screen::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(79, 172, 254, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(240, 147, 251, 0.06) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            background-size: 200% 200%;
        }

        .home-title {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease;
        }

        .home-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease 0.1s both;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px 30px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            background: none; border: none; color: var(--text-main); cursor: pointer;
            animation: fadeInUp 0.6s ease both;
        }
        .app-icon:nth-child(1) { animation-delay: 0.05s; }
        .app-icon:nth-child(2) { animation-delay: 0.1s; }
        .app-icon:nth-child(3) { animation-delay: 0.15s; }
        .app-icon:nth-child(4) { animation-delay: 0.2s; }
        .app-icon:nth-child(5) { animation-delay: 0.25s; }
        .app-icon:nth-child(6) { animation-delay: 0.3s; }
        .app-icon:nth-child(7) { animation-delay: 0.35s; }

        .icon-box {
            width: 68px; height: 68px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .icon-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .app-icon:hover .icon-box,
        .app-icon:active .icon-box {
            transform: scale(0.92) translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);
        }

        .app-icon span {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        #app-window {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        .os-nav-header {
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            background: rgba(20, 20, 22, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            width: 100%;
        }

        .btn-back {
            background: rgba(255,255,255,0.06);
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 7px 16px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); }
        .btn-back:active { transform: scale(0.96); }

        #app-content-slot {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="os-container">
    <div id="home-screen">
        <div class="home-title">FANCY AI</div>
        <div class="home-subtitle">Virtual Intelligence OS</div>
        <div class="app-grid">
            <button class="app-icon" onclick="OS.launch('MessengerApp')"><span class="icon-box">💬</span><span>Chat</span></button>
            <button class="app-icon" onclick="OS.launch('UstagramApp')"><span class="icon-box">📸</span><span>Ustagram</span></button>
            <button class="app-icon" onclick="OS.launch('RebbitApp')"><span class="icon-box">🔞</span><span>Rebbit</span></button>
            <button class="app-icon" onclick="OS.launch('YApp')"><span class="icon-box">✕</span><span>Y</span></button>
            <button class="app-icon" onclick="OS.launch('ImagingApp')"><span class="icon-box">🎨</span><span>Imaging</span></button>
            <button class="app-icon" onclick="OS.launch('GalleryApp')"><span class="icon-box">🖼️</span><span>Gallery</span></button>
            <button class="app-icon" onclick="OS.launch('ContactsApp')"><span class="icon-box">👤</span><span>Chars</span></button>
            <button class="app-icon" onclick="OS.launch('SettingsApp')"><span class="icon-box">⚙️</span><span>Settings</span></button>
            <button class="app-icon" onclick="OS.launch('GamesApp')"><span class="icon-box">🎮</span><span>Games</span></button>
        </div>
    </div>

    <div id="app-window">
        <div class="os-nav-header">
            <button onclick="OS.goHome()" class="btn-back">← Home</button>
            <strong id="os-app-title" style="color:white; font-size:1.05rem;">Application</strong>
            <div style="width:50px;"></div>
        </div>
        <div id="app-content-slot"></div>
    </div>
</div>

<script src="js/core/db.js"></script>
<script src="js/core/state.js"></script>
<script src="js/core/api.js"></script>

<script src="js/lib/jszip.min.js"></script>

<script src="js/apps/contacts.js"></script>
<script src="js/apps/gallery.js"></script>
<script src="js/apps/games.js"></script>
<script src="js/apps/imaging.js"></script>
<script src="js/apps/ustagram.js"></script>
<script src="js/apps/rebbit.js"></script>
<script src="js/apps/y.js"></script>
<script src="js/apps/messenger.js"></script>
<script src="js/apps/settings.js"></script>

<script>
    const OS = {
        activeApp: null,
        navStack: [], // {app, restore} entries for in-app navigation

        launch: function(appName, params) {
            // Cleanup previous app before switching
            if (this.activeApp && window[this.activeApp] && typeof window[this.activeApp].cleanup === 'function') {
                window[this.activeApp].cleanup();
            }

            this.activeApp = appName;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-window').style.display = 'flex';
            document.getElementById('os-app-title').innerText = appName.replace('App', '');

            // Clear in-app nav stack when launching a new app
            this.navStack = [];
            history.pushState({ app: appName }, "", `#${appName}`);

            const slot = document.getElementById('app-content-slot');
            slot.innerHTML = '';

            if (window[appName] && typeof window[appName].init === 'function') {
                window[appName].init(slot, params);
            } else {
                slot.innerHTML = `<div style="padding:30px; text-align:center; color:var(--text-muted);">App reference error [${appName}].</div>`;
            }
        },

        // Push an in-app view onto the nav stack for back navigation
        pushView: function(restoreFn) {
            if (this.activeApp) {
                this.navStack.push({ app: this.activeApp, restore: restoreFn });
                history.pushState({ appView: true }, "");
            }
        },

        // Navigate back within the app, or go home
        goBack: function() {
            if (this.navStack.length > 0) {
                const prev = this.navStack.pop();
                if (prev && typeof prev.restore === 'function') {
                    prev.restore();
                }
                // Remove our pushed state
                if (window.history.state && window.history.state.appView) {
                    history.back();
                }
            } else {
                this.goHome();
            }
        },

        goHome: function() {
            // Cleanup the active app's timer before going home
            if (this.activeApp && window[this.activeApp] && typeof window[this.activeApp].cleanup === 'function') {
                window[this.activeApp].cleanup();
            }
            this.activeApp = null;
            this.navStack = [];
            document.getElementById('app-window').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
            if(location.hash) history.replaceState(null, "", " ");
        },

        formatMarkdown: function(text) {
            if (!text) return "";
            // Simple Markdown parsing: **bold**, *italic*
            return text
                .replace(/\*\*\*(.*?)\*\*\*/g, '<b><i>$1</i></b>')
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                .replace(/__(.*?)__/g, '<b>$1</b>')
                .replace(/_(.*?)_/g, '<i>$1</i>');
        },

        notify: function(msg) {
            alert(msg);
        }
    };

    window.addEventListener('popstate', function(event) {
        // If Imaging lightbox is open, it handles its own popstate (see imaging.js)
        
        // If we have in-app nav stack entries, pop back in the app
        if (OS.navStack.length > 0) {
            const prev = OS.navStack.pop();
            if (prev && typeof prev.restore === 'function') {
                prev.restore();
                return;
            }
        }
        if (!event.state || !event.state.app) {
            OS.goHome();
        }
    });

    // Start background autonomous activity on boot
    window.addEventListener('load', () => {
        // Each social app manages its own autonomous timer when opened
        console.log("Fancy AI OS ready. Apps: Ustagram, Rebbit, Y");
    });
</script>
</body>
</html>
